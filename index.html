<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiikawa 努力日誌</title>
    <style>
        :root { 
            --chiikawa-pink: #ffdae0; 
            --hachiware-blue: #d0e7ff; 
            --usagi-yellow: #fff4d0;
            --text: #5a4a42;
            --p: #ff9fb2;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background: #fffafa; 
            margin: 0; padding-bottom: 90px; color: var(--text);
            background-image: radial-gradient(#ffe4e9 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .header { 
            background: white; color: var(--p); padding: 15px; text-align: center; 
            border-bottom: 5px solid var(--chiikawa-pink);
        }
        .chiikawa-img { width: 120px; display: block; margin: 0 auto 10px; border-radius: 10px; }
        
        .page { display: none; padding: 20px; animation: popIn 0.4s ease; }
        .active { display: block; }
        @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .card { 
            background: white; padding: 18px; border-radius: 20px; 
            border: 3px solid var(--chiikawa-pink); box-shadow: 0 5px 0 var(--chiikawa-pink);
            margin-bottom: 20px; position: relative;
        }
        
        /* 進度條 */
        .progress-container { background: #eee; border-radius: 10px; height: 12px; margin: 10px 0; overflow: hidden; border: 1px solid #ddd; }
        .progress-bar { background: linear-gradient(90deg, var(--p), #ffc1cc); height: 100%; width: 0%; transition: width 0.5s ease; }

        /* 按鈕與輸入 */
        input, select { width: 100%; padding: 12px; border: 2px solid var(--hachiware-blue); border-radius: 12px; margin-bottom: 8px; }
        button { border: none; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-start { background: var(--p); color: white; width: 100%; font-size: 18px; }
        .btn-main { background: var(--hachiware-blue); color: #4a76a8; width: 100%; }

        /* 導航 */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 3px solid var(--chiikawa-pink); height: 75px; align-items: center; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #d1b8b8; font-size: 12px; }
        .nav-item.active-nav { color: var(--p); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="points-display">✨ 努力積分：<span id="total-points">0</span> pt</div>
</div>

<div id="target-page" class="page active">
    <img src="cheer.jpg" class="chiikawa-img" alt="加油！">
    <div class="card">
        <h3 style="text-align:center; color:#ff9fb2;">( ᐢ˙꒳˙ᐢ ) 專注討伐中</h3>
        <select id="active-task-select"></select>
        <div id="timer" style="font-size:40px; text-align:center; margin:10px; font-weight:bold; color:var(--p);">00:00:00</div>
        <button id="timer-btn" class="btn-start" onclick="toggleTimer()">開始努力！</button>
    </div>
    
    <div class="card">
        <h3>📝 目標設定</h3>
        <input type="text" id="target-name" placeholder="目標名稱">
        <div style="display:flex; gap:5px;">
            <input type="number" id="target-min" placeholder="分鐘">
            <input type="number" id="target-reward" placeholder="積分">
        </div>
        <button class="btn-main" onclick="addTarget()">加入計畫</button>
        <div id="targets-list" style="margin-top:10px;"></div>
    </div>
</div>

<div id="reward-page" class="page">
    <img src="stand.png" class="chiikawa-img" alt="獎勵！">
    <div class="card">
        <h3>🍭 獎勵商店</h3>
        <input type="text" id="reward-name" placeholder="想給自己的獎勵">
        <input type="number" id="reward-cost" placeholder="需要積分">
        <button class="btn-main" onclick="addReward()" style="background:var(--usagi-yellow);">新增獎勵</button>
        <div id="rewards-list" style="margin-top:10px;"></div>
    </div>
    <div class="card">
        <h3 style="font-size:16px;">📜 兌換歷史</h3>
        <div id="history-list" style="font-size:12px; color:#888; max-height:100px; overflow-y:auto;"></div>
    </div>
</div>

<div id="vision-page" class="page">
    <img src="friends.png" class="chiikawa-img" alt="夢想！">
    <div class="card">
        <h3>🌈 長期動力進度</h3>
        <input type="text" id="vision-text" placeholder="你的夢想是？">
        <button class="btn-main" onclick="addVision()" style="background:var(--chiikawa-pink);">寫下夢想</button>
        <div id="visions-list" style="margin-top:10px;"></div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active-nav" onclick="showPage('target', this)">🏃<br>努力</div>
    <div class="nav-item" onclick="showPage('reward', this)">🍬<br>獎勵</div>
    <div class="nav-item" onclick="showPage('vision', this)">✨<br>動力</div>
</nav>

<script>
    // 資料結構與邏輯與之前相同，加上了進度條與歷史紀錄功能
    let db = JSON.parse(localStorage.getItem('chiikawaDB_v3')) || {
        points: 0, targets: [], rewards: [], visions: [], history: []
    };

    let timerInterval, startTime, isRunning = false;

    function save() {
        localStorage.setItem('chiikawaDB_v3', JSON.stringify(db));
        renderAll();
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId + '-page').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
    }

    function addTarget() {
        const n = document.getElementById('target-name').value;
        const m = parseInt(document.getElementById('target-min').value);
        const r = parseInt(document.getElementById('target-reward').value);
        if(n && m && r) { db.targets.push({name:n, min:m, reward:r}); save(); }
    }

    function addReward() {
        const n = document.getElementById('reward-name').value;
        const c = parseInt(document.getElementById('reward-cost').value);
        if(n && c) { db.rewards.push({name:n, cost:c}); save(); }
    }

    function addVision() {
        const t = document.getElementById('vision-text').value;
        if(t) { db.visions.push({text:t, progress:0}); save(); }
    }

    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        const task = db.targets[document.getElementById('active-task-select').value];
        if(!isRunning) {
            if(!task) return alert("請先新增目標！");
            startTime = new Date();
            timerInterval = setInterval(() => {
                const diff = new Date(new Date() - startTime);
                document.getElementById('timer').innerText = diff.getUTCHours().toString().padStart(2, '0') + ":" + diff.getUTCMinutes().toString().padStart(2, '0') + ":" + diff.getUTCSeconds().toString().padStart(2, '0');
            }, 1000);
            btn.innerText = "完成討伐！";
            isRunning = true;
        } else {
            clearInterval(timerInterval);
            const min = (new Date() - startTime) / 60000;
            let earned = 0;
            if(min >= task.min) { 
                earned = task.reward; 
                db.visions.forEach(v => v.progress += (Math.random() * 0.009 + 0.001)); 
            } else if(min >= 5) { 
                earned = Math.floor(task.reward / 2); 
                db.visions.forEach(v => v.progress += (Math.random() * 0.004 + 0.001));
            }
            db.points += earned;
            document.getElementById('timer').innerText = "00:00:00";
            btn.innerText = "開始努力！";
            isRunning = false;
            save();
            alert(`獲得了 ${earned} 積分！`);
        }
    }

    function useReward(i) {
        if(db.points >= db.rewards[i].cost) {
            db.points -= db.rewards[i].cost;
            db.history.unshift(`${new Date().toLocaleDateString()} 兌換了 ${db.rewards[i].name}`);
            save();
        } else { alert("積分不夠換唷..."); }
    }

    function deleteItem(key, i) { if(confirm('要刪除嗎？')) { db[key].splice(i, 1); save(); } }

    function renderAll() {
        document.getElementById('total-points').innerText = Math.floor(db.points);
        document.getElementById('active-task-select').innerHTML = db.targets.map((t, i) => `<option value="${i}">${t.name} (${t.min}分)</option>`).join('');
        document.getElementById('targets-list').innerHTML = db.targets.map((t, i) => `<div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #eee; padding-bottom:3px;"><span>${t.name} (${t.reward}pt)</span><button onclick="deleteItem('targets', ${i})" style="background:none; color:red;">x</button></div>`).join('');
        document.getElementById('rewards-list').innerHTML = db.rewards.map((r, i) => `<div style="margin-bottom:5px;"><button onclick="useReward(${i})" style="width:80%; text-align:left;">🎁 ${r.name} (${r.cost}pt)</button><button onclick="deleteItem('rewards', ${i})" style="width:15%; background:none;">x</button></div>`).join('');
        document.getElementById('history-list').innerHTML = db.history.map(h => `<div>• ${h}</div>`).join('');
        document.getElementById('visions-list').innerHTML = db.visions.map((v, i) => `
            <div style="margin-bottom:15px;">
                <div style="display:flex; justify-content:space-between; font-size:14px;"><strong>${v.text}</strong><span onclick="deleteItem('visions', ${i})" style="color:red; cursor:pointer;">x</span></div>
                <div class="progress-container"><div class="progress-bar" style="width:${Math.min(100, v.progress)}%"></div></div>
                <div style="font-size:10px; color:#aaa; text-align:right;">進度: ${v.progress.toFixed(4)}%</div>
            </div>`).join('');
    }
    renderAll();
</script>
</body>
</html>
